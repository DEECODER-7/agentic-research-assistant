# Render deployment config for the FastAPI backend (Stage 4).
#
# Setup:
#   1. Push this repo to GitHub, with data/chroma_db/ committed (see README).
#   2. In Render: New -> Blueprint -> connect this repo. Render reads this
#      file automatically and creates the service below.
#   3. Set GROQ_API_KEY as a secret in the Render dashboard (Environment tab)
#      — never commit it here or anywhere in the repo.
#
# The free tier spins down after ~15 min idle and takes ~30-60s to wake back
# up on the next request — expected for a portfolio deployment, not a bug.

services:
  - type: web
    name: agentic-research-assistant-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GROQ_API_KEY
        sync: false  # set manually in the dashboard — keeps it out of git
